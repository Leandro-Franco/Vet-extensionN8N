<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>VetSmart — Configurações</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 16px;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 4px;
      color: #2e7d32;
    }
    .subtitle {
      font-size: 11px;
      color: #777;
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 10px;
    }
    label span {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }
    input {
      width: 100%;
      padding: 5px 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      color: #222;
    }
    input:focus { outline: 2px solid #2e7d32; border-color: transparent; }
    button {
      width: 100%;
      padding: 7px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      margin-top: 4px;
    }
    button:hover { background: #1b5e20; }
    #msg {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      color: #2e7d32;
      min-height: 16px;
    }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 14px 0;
    }
    .info {
      font-size: 10px;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>🐾 VetSmart</h2>
  <p class="subtitle">Configurações da extensão SimplesVet → n8n</p>

  <label>
    <span>Webhook n8n URL</span>
    <input id="webhook-url" type="text" placeholder="https://n8n-n8n.stlrvo.easypanel.host/webhook/...">
  </label>

  <label>
    <span>Token</span>
    <input id="token" type="text" placeholder="secret">
  </label>

  <button id="save">Salvar configurações</button>
  <div id="msg"></div>

  <hr class="divider">
  <p class="info">
    As configurações são aplicadas na próxima vez que o painel capturar ou enviar dados.<br>
    Para aplicar imediatamente, recarregue a página do SimplesVet.
  </p>

  <script src="popup.js"></script>
</body>
</html>
